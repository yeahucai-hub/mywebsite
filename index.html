<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能客服 - AI 助手</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
      --bot-bubble: #ffffff;
      --shadow: 0 2px 15px rgba(0,0,0,0.08);
      --radius: 18px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(99,102,241,0.3);
      position: relative;
      z-index: 10;
    }
    
    .header-avatar {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      backdrop-filter: blur(4px);
    }
    
    .header-info h1 {
      color: white;
      font-size: 16px;
      font-weight: 600;
    }
    
    .header-info .status {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }
    
    .status-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    .status-dot.offline { background: #f87171; animation: none; }
    .status-dot.busy { background: #fbbf24; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    
    .status-text {
      color: rgba(255,255,255,0.9);
      font-size: 12px;
    }
    
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    
    .header-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
    }
    
    .header-btn:hover { background: rgba(255,255,255,0.25); }
    
    /* ===== INTENT BADGE ===== */
    #intent-badge {
      background: var(--card-bg);
      padding: 8px 16px;
      display: none;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    
    #intent-badge.show { display: flex; }
    
    .intent-tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      color: white;
    }
    
    /* ===== CHAT AREA ===== */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    
    /* ===== MESSAGES ===== */
    .message-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message-row.user { flex-direction: row-reverse; }
    
    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .msg-avatar.bot {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    
    .msg-avatar.user {
      background: linear-gradient(135deg, #f0f2f5, #e5e7eb);
      color: #374151;
    }
    
    .msg-content { max-width: 75%; }
    
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 14px;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow);
    }
    
    .message-row.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    
    .message-row.user .bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .bubble strong { font-weight: 600; }
    
    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    
    .message-row.user .msg-time { text-align: right; }
    
    /* ===== TYPING INDICATOR ===== */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
      background: white;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: var(--shadow);
    }
    
    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #a5b4fc;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    
    /* ===== QUICK REPLIES ===== */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    
    .quick-btn {
      background: white;
      border: 1.5px solid #e0e7ff;
      color: #6366f1;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .quick-btn:hover {
      background: #6366f1;
      color: white;
      border-color: #6366f1;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }
    
    /* ===== ESCALATION CARD ===== */
    .escalation-card {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 1px solid #f59e0b;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 6px;
    }
    
    .escalation-card h4 { color: #92400e; font-size: 14px; margin-bottom: 6px; }
    .escalation-card p { color: #78350f; font-size: 13px; line-height: 1.5; }
    
    /* ===== SATISFACTION ===== */
    .satisfaction-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-top: 6px;
    }
    
    .satisfaction-card h4 {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
    }
    
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    
    .star-btn {
      font-size: 26px;
      cursor: pointer;
      opacity: 0.3;
      transition: all 0.2s;
      border: none;
      background: none;
      padding: 4px;
    }
    
    .star-btn:hover, .star-btn.active { opacity: 1; transform: scale(1.2); }
    
    .satisfaction-submitted {
      text-align: center;
      color: #10b981;
      font-size: 14px;
      font-weight: 500;
    }
    
    /* ===== DATE DIVIDER ===== */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
    }
    
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    /* ===== INPUT AREA ===== */
    .input-area {
      background: var(--card-bg);
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    
    #message-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid transparent;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text);
    }
    
    #message-input:focus { border-color: var(--primary-light); }
    #message-input::placeholder { color: #9ca3af; }
    
    #send-btn {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(99,102,241,0.4);
    }
    
    #send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 16px rgba(99,102,241,0.5); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    #send-btn svg { width: 18px; height: 18px; }
    
    .input-hints {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .hint-chip {
      background: #f3f4f6;
      border: none;
      color: #6b7280;
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .hint-chip:hover { background: #e0e7ff; color: #6366f1; }
    
    /* ===== ESCALATED STATE ===== */
    .escalated-banner {
      background: linear-gradient(135deg, #fff7ed, #fed7aa);
      border-top: 2px solid #f97316;
      padding: 14px 16px;
      text-align: center;
      font-size: 13px;
      color: #9a3412;
    }
    
    .escalated-banner .icon { font-size: 20px; }
    
    /* ===== MARKDOWN RENDERING ===== */
    .bubble .md-bold { font-weight: 600; }
    .bubble .md-list { margin: 4px 0; }
    .bubble .section { margin: 8px 0 4px; }
    
    /* ===== ADMIN LINK ===== */
    .admin-link {
      position: fixed;
      bottom: 80px;
      right: 16px;
      background: white;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 11px;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: all 0.2s;
      z-index: 100;
    }
    
    .admin-link:hover { color: var(--primary); border-color: var(--primary); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-avatar">🤖</div>
  <div class="header-info">
    <h1>智能客服助手</h1>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">在线服务中</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="newConversation()">🔄 新对话</button>
    <a href="/admin" class="header-btn" style="text-decoration:none">📊 后台</a>
  </div>
</div>

<!-- Intent Badge -->
<div id="intent-badge">
  <span>当前识别意图：</span>
  <span id="intent-tag" class="intent-tag"></span>
</div>

<!-- Chat Messages -->
<div id="chat-container"></div>

<!-- Input Area / Escalated Banner -->
<div id="footer-area">
  <div class="input-area" id="input-area">
    <div class="input-hints" id="hint-chips">
      <button class="hint-chip" onclick="quickSend('如何查询我的订单？')">📦 查询订单</button>
      <button class="hint-chip" onclick="quickSend('我想申请退款')">💰 申请退款</button>
      <button class="hint-chip" onclick="quickSend('登录时遇到问题')">🔧 技术支持</button>
      <button class="hint-chip" onclick="quickSend('转人工客服')">👤 转人工</button>
    </div>
    <div class="input-row">
      <textarea id="message-input" placeholder="请输入您的问题..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ============================================
// 状态管理
// ============================================
let sessionId = null;
let isTyping = false;
let isEscalated = false;
let currentIntent = 'unknown';
let messageCount = 0;

const intentColors = {
  refund: '#ef4444',
  order: '#3b82f6',
  tech: '#8b5cf6',
  account: '#f59e0b',
  general: '#10b981',
  unknown: '#6b7280'
};

// ============================================
// 初始化
// ============================================
window.addEventListener('DOMContentLoaded', async () => {
  await startSession();
});

async function startSession() {
  try {
    const res = await fetch('/api/session', { method: 'POST' });
    const data = await res.json();
    sessionId = data.sessionId;
    
    appendMessage('bot', data.welcomeMessage, { 
      showQuickReplies: true,
      quickReplies: ['查询订单状态', '申请退款', '技术问题求助', '咨询人工客服']
    });
  } catch (e) {
    appendMessage('bot', '⚠️ 连接服务器失败，请刷新页面重试。');
  }
}

// ============================================
// 消息发送
// ============================================
async function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  
  if (!text || isTyping) return;
  
  // 清除提示chips（首次发送后隐藏）
  document.getElementById('hint-chips').style.display = 'none';
  
  input.value = '';
  input.style.height = 'auto';
  
  appendMessage('user', text);
  
  if (isEscalated) {
    appendMessage('bot', '您的对话已转接人工客服，请耐心等待。如需重新使用智能客服，请点击"新对话"。');
    return;
  }
  
  setTyping(true);
  
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message: text })
    });
    
    const contentType = response.headers.get('Content-Type') || '';
    
    if (contentType.includes('text/event-stream')) {
      // SSE 流式响应
      await handleStreamResponse(response);
    } else {
      // JSON 响应（转人工或错误）
      setTyping(false);
      const data = await response.json();
      
      if (data.status === 'escalated') {
        handleEscalation(data);
      } else {
        appendMessage('bot', data.message);
      }
    }
  } catch (e) {
    setTyping(false);
    appendMessage('bot', '⚠️ 网络异常，请稍后重试。');
  }
}

// ============================================
// 流式响应处理
// ============================================
async function handleStreamResponse(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  
  let msgEl = null;
  let fullText = '';
  
  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      const text = decoder.decode(value);
      const lines = text.split('\n');
      
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        
        try {
          const data = JSON.parse(line.slice(6));
          
          if (data.type === 'chunk') {
            if (!msgEl) {
              setTyping(false);
              msgEl = appendMessage('bot', '', { streaming: true });
            }
            fullText += data.chunk;
            updateStreamingMessage(msgEl, fullText);
          } else if (data.type === 'done') {
            // 更新意图
            if (data.intent && data.intent !== 'unknown') {
              updateIntentBadge(data.intent, data.intentLabel);
            }
            messageCount = data.messageCount;
            
            // 在满意度评分前，先判断是否需要展示快速回复
            if (messageCount > 2 && messageCount % 4 === 0 && !isEscalated) {
              appendSatisfactionCard();
            }
          }
        } catch (e) { /* 忽略解析错误 */ }
      }
    }
  } catch (e) {
    setTyping(false);
    if (!msgEl) appendMessage('bot', '⚠️ 响应异常，请重试。');
  }
}

// ============================================
// DOM 操作
// ============================================
function appendMessage(role, content, opts = {}) {
  const container = document.getElementById('chat-container');
  const row = document.createElement('div');
  row.className = `message-row ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🤖' : '👤';
  
  const msgContent = document.createElement('div');
  msgContent.className = 'msg-content';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(content);
  
  if (opts.streaming) {
    bubble.innerHTML = '<span class="cursor">▌</span>';
  }
  
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = formatTime(new Date());
  
  msgContent.appendChild(bubble);
  msgContent.appendChild(timeEl);
  
  row.appendChild(avatar);
  row.appendChild(msgContent);
  
  // 快速回复按钮
  if (opts.showQuickReplies && opts.quickReplies) {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    opts.quickReplies.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = q;
      btn.onclick = () => quickSend(q);
      qr.appendChild(btn);
    });
    msgContent.appendChild(qr);
  }
  
  container.appendChild(row);
  scrollToBottom();
  
  return bubble;
}

function updateStreamingMessage(el, text) {
  el.innerHTML = renderMarkdown(text) + '<span class="cursor blink">▌</span>';
  scrollToBottom();
}

function setTyping(show) {
  isTyping = show;
  document.getElementById('send-btn').disabled = show;
  
  const existing = document.getElementById('typing-row');
  if (existing) existing.remove();
  
  if (show) {
    const container = document.getElementById('chat-container');
    const row = document.createElement('div');
    row.id = 'typing-row';
    row.className = 'message-row bot';
    row.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;
    container.appendChild(row);
    scrollToBottom();
  }
}

function updateIntentBadge(intent, intentLabel) {
  currentIntent = intent;
  const badge = document.getElementById('intent-badge');
  const tag = document.getElementById('intent-tag');
  
  badge.classList.add('show');
  tag.textContent = `${intentLabel.icon} ${intentLabel.text}`;
  tag.style.background = intentLabel.color;
}

function handleEscalation(data) {
  isEscalated = true;
  
  // 更新头部状态
  document.getElementById('status-dot').className = 'status-dot busy';
  document.getElementById('status-text').textContent = '转接人工中';
  
  const escalateMsg = data.message || '正在为您转接人工客服...';
  const bubble = appendMessage('bot', escalateMsg);
  
  // 追加转人工卡片
  const card = document.createElement('div');
  card.className = 'escalation-card';
  card.innerHTML = `
    <h4>🧑‍💼 转人工客服</h4>
    <p>人工客服工作时间：周一至周五 9:00-18:00<br>
    非工作时间可留言，我们会尽快回复您。<br>
    <strong>等待时间：约 3-5 分钟</strong></p>`;
  bubble.parentNode.appendChild(card);
  
  // 替换输入区
  const inputArea = document.getElementById('input-area');
  inputArea.innerHTML = `
    <div class="escalated-banner">
      <div class="icon">🧑‍💼</div>
      <div style="margin-top:4px">已转接人工客服，请耐心等待</div>
      <div style="margin-top:4px; opacity:0.7">如需重新咨询 <a href="javascript:newConversation()" style="color:#9a3412;font-weight:600">开启新对话</a></div>
    </div>`;
  
  scrollToBottom();
}

function appendSatisfactionCard() {
  const container = document.getElementById('chat-container');
  const row = document.createElement('div');
  row.className = 'message-row bot';
  row.innerHTML = `
    <div class="msg-avatar bot">🤖</div>
    <div class="msg-content">
      <div class="satisfaction-card" id="sat-card">
        <h4>😊 问题解决了吗？请给本次服务评分</h4>
        <div class="stars">
          ${[1,2,3,4,5].map(i => `
            <button class="star-btn" data-score="${i}" onclick="submitSatisfaction(${i})">⭐</button>
          `).join('')}
        </div>
      </div>
    </div>`;
  container.appendChild(row);
  scrollToBottom();
}

async function submitSatisfaction(score) {
  try {
    await fetch(`/api/chat/${sessionId}/satisfaction`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ score })
    });
  } catch (e) {}
  
  const card = document.getElementById('sat-card');
  if (card) {
    const stars = '⭐'.repeat(score);
    card.innerHTML = `<div class="satisfaction-submitted">✅ 感谢您的评价！${stars}</div>`;
  }
}

// ============================================
// 工具函数
// ============================================
function quickSend(text) {
  const input = document.getElementById('message-input');
  input.value = text;
  sendMessage();
}

function newConversation() {
  if (confirm('确定开启新对话？当前对话记录将被保存。')) {
    location.reload();
  }
}

function scrollToBottom() {
  const container = document.getElementById('chat-container');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function formatTime(date) {
  return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^#{1,3}\s(.+)$/gm, '<div class="section"><strong>$1</strong></div>')
    .replace(/^[•\-]\s(.+)$/gm, '<div class="md-list">• $1</div>')
    .replace(/^\d+\)\s(.+)$/gm, '<div class="md-list">$&</div>')
    .replace(/\n/g, '<br>');
}

// ============================================
// 输入框自动调整高度
// ============================================
const textarea = document.getElementById('message-input');
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ============================================
// 光标闪烁样式
// ============================================
const style = document.createElement('style');
style.textContent = `
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .blink { animation: blink 0.8s infinite; }
`;
document.head.appendChild(style);
</script>
